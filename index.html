<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Siva's WhatsApp Channel</title>
  <link rel="icon" href="spm.ico" />

  <!-- Import Brand Font -->
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --gold: #C89B3C;
      --bronze: #8B5E1A;
      --ivory: #F8F4EC;
      --cream: #FFFDF8;
      --dark-brown: #35271A;
      --warm-neutral: #EFEAE0;
    }

    body {
      font-family: 'Hind Siliguri', sans-serif;
      margin: 0;
      padding: 20px;
      background-color: var(--ivory);
      background-image: radial-gradient(circle at center, var(--cream) 0%, var(--warm-neutral) 100%);
      color: var(--dark-brown);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--cream);
      border-radius: 30px;
      padding: 45px 30px;
      box-shadow: 0 20px 60px rgba(53, 39, 26, 0.12);
      border: 1px solid rgba(200, 155, 60, 0.2);
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-sizing: border-box;
      animation: slideUp 0.7s ease-out;
    }

    /* Brand Image Container */
    .brand-profile-wrapper {
      position: relative;
      width: 130px;
      height: 130px;
      margin: 0 auto 25px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-image {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover; /* This ensures the face isn't stretched */
      border: 4px solid white;
      box-shadow: 0 8px 20px rgba(139, 94, 26, 0.2);
      background-color: var(--warm-neutral); /* Fallback color */
      z-index: 2;
    }

    /* Luxury Gold Ring */
    .brand-profile-wrapper::after {
      content: '';
      position: absolute;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      opacity: 0.5;
      z-index: 1;
    }

    h1 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--bronze);
      margin: 0 0 12px 0;
      font-weight: 700;
      opacity: 0.8;
    }

    .content-title {
      font-size: 1.6rem;
      color: var(--dark-brown);
      margin-bottom: 35px;
      font-weight: 700;
      line-height: 1.3;
    }

    .btn-proceed {
      display: inline-block;
      width: 100%;
      font-family: 'Hind Siliguri', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 16px 0;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      background: linear-gradient(145deg, var(--gold), var(--bronze));
      color: white;
      border: none;
      box-shadow: 0 10px 25px rgba(139, 94, 26, 0.3);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-proceed:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(139, 94, 26, 0.4);
      filter: brightness(1.1);
    }

    .footer-note {
      margin-top: 25px;
      font-size: 0.8rem;
      color: var(--bronze);
      opacity: 0.6;
    }

    @media (max-width: 480px) {
      .card { padding: 40px 20px; }
      .content-title { font-size: 1.4rem; }
    }
    footer {
      padding: 10px;
      font-size: 0.8rem;
      color: var(--bronze);
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="brand-profile-wrapper">
      <!-- Direct reference to your image -->
      <img src="name.jpg" alt="Brand Identity" class="brand-image">
    </div>

    <h1>Follow</h1>
    <div class="content-title">Siva's WhatsApp Channel</div>

    <button id="proceedBtn" class="btn-proceed">
        Proceed Now
    </button>
    
    <p class="footer-note">Practical AI, content creation, branding, and digital growth insights—straight from Siva.</p>

  <footer>
    <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
  </footer>

  </div>



  <script>
    // ----------------------------------------------
    // REDIRECTION LOGIC
    // ----------------------------------------------
    const REAL_URL = "https://whatsapp.com/channel/0029VbDF4A46mYPR8jYTvG1z";

    function obfuscate(str) {
      return btoa(str.split("").reverse().join(""));
    }

    function reveal(encoded) {
      return atob(encoded).split("").reverse().join("");
    }

    const hiddenEncoded = obfuscate(REAL_URL);

    document.getElementById("proceedBtn").onclick = function() {
      this.innerText = "Connecting...";
      this.style.pointerEvents = "none";
      this.style.opacity = "0.8";

      const destination = reveal(hiddenEncoded);
      
      // Artificial delay for a premium smooth feel
      setTimeout(() => {
        window.location.href = destination;
      }, 500);
    };
  </script>

</body>
</html>
